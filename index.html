<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Ali Bazlamit — Web Design Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#0E1F2D;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .wrap{max-width:640px}
    .mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1E7A86,#13453A);display:flex;align-items:center;justify-content:center;font-family:'El Messiri';font-weight:700;font-size:1.6rem;margin:0 auto 1.6rem}
    h1{font-family:'El Messiri';font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;line-height:1.3;margin-bottom:1rem}
    p{color:#9FB3C0;font-size:1.05rem;line-height:1.9;font-weight:300}
    .tag{display:inline-block;margin-top:1.8rem;padding:.6rem 1.4rem;border:1px solid rgba(255,255,255,.18);border-radius:999px;color:#cfe;font-size:.9rem}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark">AB</div>
    <h1>تصميم مواقع احترافية للعيادات والأعمال</h1>
    <p>استوديو متخصص في بناء مواقع عربية أنيقة وسريعة تعكس مكانة عملك وتجلب لك عملاء جدد عبر بحث جوجل.</p>
    <span class="tag">Ali Bazlamit · Web Design Studio · Amman</span>
  </div>
</body>
</html>
